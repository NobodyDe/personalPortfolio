name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code Quality & Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      # 1. Checkout do código
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Instalar pnpm
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. Setup do Node.js com cache
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # 4. Instalar dependências
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Lint
      - name: Run ESLint
        run: pnpm run lint

      # 6. Verificar formatação
      - name: Check formatting
        run: pnpm run format:check

      # 7. Rodar testes unitários
      - name: Run unit tests
        run: pnpm run test:run

      # 8. Build
      - name: Build project
        run: pnpm run build

  # Job separado para E2E (mais pesado)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: quality # só roda depois do job 'quality' passar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality # 🚨 SÓ GERA A IMAGEM SE OS TESTES DO LINT PASSAREM
    if: github.ref == 'refs/heads/main' # Só publica se commitar na MAIN
    permissions:
      contents: read
      packages: write # Permissão para subir a imagem no GitHub Registry
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      # 1. Faz login no GitHub Container Registry usando o token automático do próprio GitHub
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 2. Converte as letras maiúsculas em minúsculas caso o repositório tenha (O docker quebra com letras Maiúsculas)
      - name: Lowercase Repository Name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}
      # 3. Faz o Build e o Push real
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Publica duas tags simultaneamente: a tag 'latest' e uma com o SHA único do commit!
          tags: |
            ghcr.io/${{ env.REPO }}:latest
            ghcr.io/${{ env.REPO }}:${{ github.sha }}
